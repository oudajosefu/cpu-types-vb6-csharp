<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>50 Years of CPU Type Sizes — C, VB6, C#</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Barlow+Condensed:wght@300;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c0f;
    --bg2: #0f1318;
    --grid-line: #1a1f28;
    --border: #242b38;
    --amber: #e8a020;
    --amber-dim: #7a5010;
    --amber-glow: rgba(232,160,32,0.14);
    --cyan: #20c8d0;
    --red: #e05040;
    --red-glow: rgba(224,80,64,0.11);
    --green: #50c878;
    --purple: #a070e8;
    --purple-dim: #3e2070;
    --purple-glow: rgba(160,112,232,0.13);
    --mint: #30dba8;
    --mint-dim: #0e5840;
    --mint-glow: rgba(48,219,168,0.13);
    --muted: #4a5568;
    --text: #c8d4e0;
    --text-dim: #5a6880;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    padding: 32px 20px 80px;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 39px, var(--grid-line) 39px, var(--grid-line) 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, var(--grid-line) 39px, var(--grid-line) 40px);
  }

  .main { max-width: 1200px; margin: 0 auto; display: flex; flex-direction: column; gap: 44px; }

  header { border-left: 3px solid var(--amber); padding-left: 20px; }
  header h1 {
    font-family: 'Barlow Condensed', sans-serif; font-weight: 900;
    font-size: clamp(24px, 4vw, 48px); text-transform: uppercase;
    color: #fff; line-height: 1; letter-spacing: -0.5px;
  }
  header p { margin-top: 8px; font-size: 11px; color: var(--text-dim); letter-spacing: 2px; text-transform: uppercase; line-height: 1.6; max-width: 980px; }

  .section-label {
    font-family: 'Barlow Condensed', sans-serif; font-weight: 700;
    font-size: 11px; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 12px;
  }
  .lc { color: var(--cyan); } .lvb { color: var(--purple); }
  .lcs { color: var(--mint); } .la { color: var(--amber); }
  .lg { color: var(--green); } .lr { color: var(--red); }

  /* ===== LEGEND ===== */
  .legend { display: flex; gap: 18px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 7px; font-size: 10px; color: var(--text-dim); letter-spacing: 0.5px; }
  .ldot { width: 10px; height: 10px; border-radius: 1px; flex-shrink: 0; }

  /* ===== SCROLLABLE GRID WRAPPER ===== */
  .grid-scroll { overflow-x: auto; }

  /* ===== ERA / TYPE GRIDS =====
     Columns: [label] [16-bit] [32-bit] [VB6] [C#] [64-Unix] [64-Win]
  */
  .era-grid, .type-grid {
    display: grid;
    grid-template-columns: 100px repeat(6, minmax(130px, 1fr));
    gap: 5px;
    min-width: 900px;
  }

  /* ERA CARDS */
  .era-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-top: 3px solid var(--amber-dim); padding: 12px 12px 10px;
    transition: border-color .15s, background .15s; cursor: default;
  }
  .era-card:hover        { border-top-color: var(--amber); background: var(--amber-glow); }
  .era-card.vb6col       { border-top-color: var(--purple-dim); }
  .era-card.vb6col:hover { border-top-color: var(--purple); background: var(--purple-glow); }
  .era-card.cscol        { border-top-color: var(--mint-dim); }
  .era-card.cscol:hover  { border-top-color: var(--mint); background: var(--mint-glow); }

  .era-name { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 17px; text-transform: uppercase; color: #fff; }
  .era-year { font-size: 10px; color: var(--text-dim); margin-top: 2px; }
  .era-note { font-size: 9px; color: var(--muted); margin-top: 6px; line-height: 1.4; }

  /* TYPE LABEL */
  .type-label {
    display: flex; align-items: center;
    font-size: 11px; font-weight: 700; color: var(--cyan); padding-right: 6px; letter-spacing: 0.5px;
  }

  /* CELLS */
  .cell {
    position: relative; background: var(--bg2); border: 1px solid var(--border);
    padding: 9px 10px; display: flex; flex-direction: column;
    justify-content: center; gap: 3px; min-height: 62px; transition: all .15s;
  }
  .cell:hover { z-index: 10; }
  .cell.stable  { opacity: .58; }
  .cell.changed { border-color: var(--amber); background: var(--amber-glow); opacity: 1; }
  .cell.split   { border-color: var(--red);   background: var(--red-glow);   opacity: 1; }
  .cell.na      { opacity: .22; }

  /* VB6 cells */
  .cell.vb { border-color: var(--purple-dim); background: rgba(160,112,232,.07); opacity: 1; }
  .cell.vb.ok   { border-color: var(--purple); background: var(--purple-glow); }
  .cell.vb.trap { border-color: var(--red);    background: var(--red-glow); }
  .cell.vb.trap .bit-bar { background: var(--red); }
  .cell.vb.ok   .bit-bar { background: var(--purple); }

  /* C# cells */
  .cell.cs { border-color: var(--mint-dim); background: rgba(48,219,168,.07); opacity: 1; }
  .cell.cs.ok   { border-color: var(--mint); background: var(--mint-glow); }
  .cell.cs.trap { border-color: var(--red);  background: var(--red-glow); }
  .cell.cs.win  { border-color: var(--mint); background: var(--mint-glow); } /* highlight: solves the problem */
  .cell.cs.trap .bit-bar { background: var(--red); }
  .cell.cs.ok   .bit-bar { background: var(--mint); }
  .cell.cs.win  .bit-bar { background: var(--mint); }

  .cell-bits  { font-size: 14px; font-weight: 700; font-family: 'Barlow Condensed', sans-serif; color: #fff; line-height: 1; }
  .cell-bytes { font-size: 9px; color: var(--text-dim); letter-spacing: .3px; }
  .cell-lang  { font-size: 11px; font-weight: 700; margin-bottom: 1px; }
  .cell-lang.vb-name { color: var(--purple); }
  .cell-lang.cs-name { color: var(--mint); }
  .cell-lang.trap    { color: var(--red); }
  .cell-lang.win-name { color: var(--mint); }

  .bit-bar-wrap { height: 5px; background: var(--grid-line); border-radius: 1px; overflow: hidden; margin-top: 3px; }
  .bit-bar { height: 100%; background: var(--cyan); border-radius: 1px; transition: width .3s; }
  .cell.changed .bit-bar { background: var(--amber); }
  .cell.split   .bit-bar { background: var(--red); }

  /* Badges */
  .badge {
    position: absolute; top: -1px; right: -1px;
    font-family: 'Barlow Condensed', sans-serif; font-weight: 700;
    font-size: 8px; letter-spacing: 1px; text-transform: uppercase; padding: 2px 4px;
  }
  .b-changed { background: var(--amber); color: #000; }
  .b-split   { background: var(--red);   color: #fff; }
  .b-vb      { background: var(--purple); color: #fff; }
  .b-cs      { background: var(--mint);   color: #000; }
  .b-trap    { background: var(--red);    color: #fff; }
  .b-ok      { background: var(--green);  color: #000; }
  .b-win     { background: var(--mint);   color: #000; }

  /* Tooltip */
  .cell:hover .tip, .cell:focus .tip, .cell:focus-within .tip { display: block; }
  .tip {
    display: none; position: absolute; bottom: calc(100% + 6px); left: 50%;
    transform: translateX(-50%); background: #1c2330; border: 1px solid var(--border);
    padding: 9px 13px; font-size: 10px; color: var(--text); white-space: normal;
    max-width: min(320px, calc(100vw - 32px));
    z-index: 30; line-height: 1.65; pointer-events: none; box-shadow: 0 4px 28px rgba(0,0,0,.75);
  }
  .tip::after {
    content: ''; position: absolute; top: 100%; left: 50%; transform: translateX(-50%);
    border: 5px solid transparent; border-top-color: var(--border);
  }
  .tip .tr { color: var(--red); font-weight: 700; }
  .tip .ok { color: var(--green); }
  .tip .mn { color: var(--mint); }

  /* ===== LONG SPLIT BOX ===== */
  .split-box {
    background: var(--bg2); border: 1px solid var(--red); border-left: 3px solid var(--red);
    padding: 18px 22px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px;
  }
  .split-box h3 {
    font-family: 'Barlow Condensed', sans-serif; font-weight: 700;
    font-size: 13px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--red); margin-bottom: 0; grid-column: 1/-1;
  }
  .split-col strong { font-size: 11px; color: var(--text); letter-spacing: .5px; display: block; marg[... ELLIPSIZATION ...]e = System.Single (32-bit), double = System.Double (64-bit). They usually line up with mainstream C ABIs, but C itself does not guarantee IEEE-754 in the same way the CLR does for width.</div>
        <div class="ltype-bar"><div class="ltype-fill fill-cs" style="width:75%"></div></div>
      </div>

      <!-- VB6 Currency -->
      <div class="ltype-card vb-card">
        <span class="badge b-vb" style="font-size:8px">VB6 ONLY</span>
        <div class="ltype-name vb">VB6 Currency</div>
        <div class="ltype-size">64 bits</div>
        <div class="ltype-equiv c">≈ int64_t ÷ 10,000</div>
        <div class="ltype-note">A 64-bit integer scaled by 10,000 to give 4 decimal places. C has no equivalent — use int64_t with manual scaling. C# replaced this with decimal.</div>
        <div class="ltype-bar"><div class="ltype-fill fill-vb" style="width:100%"></div></div>
      </div>

      <!-- C# decimal -->
      <div class="ltype-card cs-card">
        <span class="badge b-cs" style="font-size:8px">C# ONLY</span>
        <div class="ltype-name cs">C# decimal</div>
        <div class="ltype-size">128 bits</div>
        <div class="ltype-equiv c">no C equivalent</div>
        <div class="ltype-note">System.Decimal: 96-bit integer + scale + sign. NOT IEEE 754. Avoids floating-point rounding for money math. C has nothing like it — would need a library.</div>
        <div class="ltype-bar"><div class="ltype-fill fill-cs" style="width:100%;background:linear-gradient(90deg,var(--mint),#00a080)"></div></div>
      </div>

      <!-- VB6 Date -->
      <div class="ltype-card vb-card">
        <span class="badge b-vb" style="font-size:8px">VB6 ONLY</span>
        <div class="ltype-name vb">VB6 Date</div>
        <div class="ltype-size">64 bits</div>
        <div class="ltype-equiv c">≈ C double (different epoch)</div>
        <div class="ltype-note">Stored as a double. Integer part = days since Dec 30, 1899. C uses time_t: seconds since Jan 1, 1970. Same bit width, completely different meaning.</div>
        <div class="ltype-bar"><div class="ltype-fill fill-vb" style="width:100%"></div></div>
      </div>

      <!-- VB6 Variant -->
      <div class="ltype-card vb-card">
        <span class="badge b-vb" style="font-size:8px">VB6 ONLY</span>
        <div class="ltype-name vb">VB6 Variant</div>
        <div class="ltype-size">16 bytes</div>
        <div class="ltype-equiv c">≈ tagged union (no C equiv)</div>
        <div class="ltype-note">2-byte type tag + 6 bytes reserved + 8 bytes data. Can hold any type at runtime. C# replaced this with object (reference) or generics.</div>
        <div class="ltype-bar"><div class="ltype-fill fill-muted" style="width:100%"></div></div>
      </div>

      <!-- VB6 String -->
      <div class="ltype-card vb-card">
        <div class="ltype-name vb">VB6 String</div>
        <div class="ltype-size">variable (BSTR)</div>
        <div class="ltype-equiv c">≈ BSTR / UTF-16 buffer (length-prefixed)</div>
        <div class="ltype-note">Length-prefixed UTF-16 BSTR used by COM. BSTRs are typically also null-terminated, but the length prefix is the authoritative size. That makes them incompatible with plain C char* strings without marshalling.</div>
        <div class="ltype-bar" style="background:repeating-linear-gradient(90deg,var(--purple) 0,var(--purple) 8px,transparent 8px,transparent 12px);height:4px;border-radius:1px;margin-top:8px"></div>
      </div>

      <!-- C# string -->
      <div class="ltype-card cs-card">
        <div class="ltype-name cs">C# string</div>
        <div class="ltype-size">variable (managed heap)</div>
        <div class="ltype-equiv vb">≈ UTF-16 text; often marshalled as BSTR for COM</div>
        <div class="ltype-note">Immutable sequence of UTF-16 code units on the managed heap. A C# string is not itself a BSTR, though COM interop commonly marshals it as one. Native C interop still requires explicit marshalling.</div>
        <div class="ltype-bar" style="background:repeating-linear-gradient(90deg,var(--mint) 0,var(--mint) 8px,transparent 8px,transparent 12px);height:4px;border-radius:1px;margin-top:8px"></div>
      </div>

      <!-- C# object -->
      <div class="ltype-card cs-card">
        <div class="ltype-name cs">C# object</div>
        <div class="ltype-size">pointer-sized reference</div>
        <div class="ltype-equiv c">≈ void* (managed)</div>
        <div class="ltype-note">System.Object: root of the C# type hierarchy. A reference (pointer) to a heap-managed object. C has no GC — you'd use void* and manage memory manually.</div>
        <div class="ltype-bar"><div class="ltype-fill fill-cs" style="width:75%"></div></div>
      </div>

      <!-- C# nint -->
      <div class="ltype-card cs-card">
        <div class="ltype-name cs">C# nint / nuint</div>
        <div class="ltype-size">32 or 64 bits</div>
        <div class="ltype-equiv c">= C intptr_t / uintptr_t</div>
        <div class="ltype-note">Added in C# 9 / .NET 5. Platform-sized integers — 32-bit on 32-bit runtimes, 64-bit on 64-bit. Designed for native interop where pointer arithmetic is needed.</div>
        <div class="ltype-bar"><div class="ltype-fill fill-cs" style="width:75%"></div></div>
      </div>

    </div>
  </div>

  <!-- FIXED-WIDTH TYPES -->
  <div>
    <div class="section-label lg">The C Fix — C99 Fixed-Width Types · use these when porting to or from VB6 / C#</div>
    <div class="fixed-grid">
      <div class="fixed-card">
        <div class="fixed-type">uint8_t / int8_t</div>
        <div class="fixed-row">Always 8 bits.</div>
        <div class="fixed-row"><span class="vb">VB6 Byte → uint8_t ✓</span></div>
        <div class="fixed-row"><span class="cs">C# byte → uint8_t · sbyte → int8_t ✓</span></div>
        <div class="fixed-bar-wrap"><div class="fixed-bar" style="width:12.5%"></div></div>
      </div>
      <div class="fixed-card">
        <div class="fixed-type">int16_t / uint16_t</div>
        <div class="fixed-row">Always 16 bits.</div>
        <div class="fixed-row"><span class="vb">VB6 Integer → int16_t ✓</span></div>
        <div class="fixed-row"><span class="cs">C# short / ushort → int16_t / uint16_t ✓</span></div>
        <div class="fixed-bar-wrap"><div class="fixed-bar" style="width:25%"></div></div>
      </div>
      <div class="fixed-card">
        <div class="fixed-type">int32_t / uint32_t</div>
        <div class="fixed-row">Always 32 bits.</div>
        <div class="fixed-row"><span class="vb">VB6 Long → int32_t ✓ (NOT C long!)</span></div>
        <div class="fixed-row"><span class="cs">C# int / uint → int32_t / uint32_t ✓</span></div>
        <div class="fixed-bar-wrap"><div class="fixed-bar" style="width:50%"></div></div>
      </div>
      <div class="fixed-card">
        <div class="fixed-type">int64_t / uint64_t</div>
        <div class="fixed-row">Always 64 bits.</div>
        <div class="fixed-row"><span class="vb">VB6 Currency (×10,000) · LongLong (VBA only)</span></div>
        <div class="fixed-row"><span class="cs">C# long / ulong → int64_t / uint64_t ✓</span></div>
        <div class="fixed-bar-wrap"><div class="fixed-bar" style="width:100%"></div></div>
      </div>
      <div class="fixed-card">
        <div class="fixed-type">size_t</div>
        <div class="fixed-row">Matches pointer width. Use for lengths & counts.</div>
        <div class="fixed-row"><span class="cs">C# nint / nuint ≈ intptr_t / uintptr_t</span></div>
        <div class="fixed-bar-wrap"><div class="fixed-bar" style="width:75%"></div></div>
      </div>
      <div class="fixed-card">
        <div class="fixed-type">uint16_t</div>
        <div class="fixed-row">Always 16 bits, unsigned.</div>
        <div class="fixed-row"><span class="cs">C# char → uint16_t in portable C interop ✓</span></div>
        <div class="fixed-row" style="color:var(--red);font-size:9px">Do not map C# char to C char; use uint16_t, or wchar_t only on 16-bit-wchar_t platforms.</div>
        <div class="fixed-bar-wrap"><div class="fixed-bar" style="width:25%"></div></div>
      </div>
    </div>
  </div>

  <footer>
    <span style="color:var(--amber)">Notes:</span>
    C# type sizes are guaranteed by the ECMA-334 / ECMA-335 specs, not by the platform — this is the key difference from C.
    VB6 was 32-bit only (~1998–2008). VBA 7.0 (Office 2010+) added <code>LongLong</code> and <code>LongPtr</code> for 64-bit hosts.
    C# <code>decimal</code> is 128 bits of decimal arithmetic state, not IEEE binary floating point.
    VB6 Boolean True = −1 due to COM's <code>VARIANT_TRUE = 0xFFFF</code>.
    C99 fixed-width types: include <code>&lt;stdint.h&gt;</code> in C or <code>&lt;cstdint&gt;</code> in C++.
    On Windows, <code>wchar_t</code> is typically 16 bits; on many Unix-like systems it is 32 bits, so <code>uint16_t</code> is the safer exact-width match for C# <code>char</code>.
